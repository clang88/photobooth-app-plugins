<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth Prompt Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        header {
            background: #4a5568;
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .content {
            padding: 30px;
        }
        
        .editor-section {
            margin-bottom: 40px;
        }
        
        .editor-section h2 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .editor-pane {
            display: flex;
            flex-direction: column;
        }
        
        .editor-pane h3 {
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        #promptInput {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        #promptInput:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #markdownPreview {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: #f7fafc;
            overflow-y: auto;
        }
        
        #markdownPreview:empty::before {
            content: "Markdown preview will appear here...";
            color: #a0aec0;
            font-style: italic;
        }
        
        .button-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .status-message {
            margin-left: 15px;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 500;
            display: none;
        }
        
        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
            display: inline-block;
        }
        
        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
            display: inline-block;
        }
        
        .history-section {
            border-top: 2px solid #e2e8f0;
            padding-top: 30px;
        }
        
        .history-section h2 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .search-box {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .prompts-list {
            display: grid;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .prompt-item {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .prompt-item:hover {
            border-color: #667eea;
            background: #edf2f7;
            transform: translateX(5px);
        }
        
        .prompt-item .timestamp {
            color: #718096;
            font-size: 0.85em;
            margin-bottom: 8px;
        }
        
        .prompt-item .text {
            color: #2d3748;
            line-height: 1.5;
        }
        
        .no-prompts {
            text-align: center;
            color: #a0aec0;
            padding: 40px;
            font-style: italic;
        }
        
        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
            
            .button-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .status-message {
                margin-left: 0;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Photobooth Prompt Editor</h1>
            <p>Create and manage your AI image prompts</p>
        </header>
        
        <div class="content">
            <div class="editor-section">
                <h2>Current Prompt</h2>
                <div class="editor-container">
                    <div class="editor-pane">
                        <h3>✏️ Editor</h3>
                        <textarea id="promptInput" placeholder="Enter your prompt here..."></textarea>
                    </div>
                    <div class="editor-pane">
                        <h3>👁️ Preview</h3>
                        <div id="markdownPreview"></div>
                    </div>
                </div>
                <div class="button-container">
                    <button onclick="updatePrompt()">Update Prompt</button>
                    <span class="status-message" id="statusMessage"></span>
                </div>
            </div>
            
            <div class="history-section">
                <h2>Prior Prompts</h2>
                <input 
                    type="text" 
                    class="search-box" 
                    id="searchBox" 
                    placeholder="🔍 Search prompts..."
                    oninput="filterPrompts()"
                >
                <div class="prompts-list" id="promptsList">
                    <div class="no-prompts">No prompts yet. Create your first one!</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let allPrompts = [];
        
        // Load current prompt and history on page load
        async function loadPrompts() {
            try {
                const response = await fetch('/api/prompts');
                const data = await response.json();
                
                // Set current prompt
                document.getElementById('promptInput').value = data.current || '';
                updatePreview();
                
                // Set history
                allPrompts = data.history || [];
                displayPrompts(allPrompts);
            } catch (error) {
                console.error('Error loading prompts:', error);
                showStatus('Failed to load prompts', 'error');
            }
        }
        
        // Update markdown preview
        function updatePreview() {
            const input = document.getElementById('promptInput').value;
            const preview = document.getElementById('markdownPreview');
            preview.innerHTML = marked.parse(input || '');
        }
        
        // Listen for input changes
        document.getElementById('promptInput').addEventListener('input', updatePreview);
        
        // Update prompt
        async function updatePrompt() {
            const prompt = document.getElementById('promptInput').value;
            
            if (!prompt.trim()) {
                showStatus('Prompt cannot be empty', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('Prompt updated successfully!', 'success');
                    loadPrompts(); // Reload to get updated history
                } else {
                    showStatus('Failed to update prompt', 'error');
                }
            } catch (error) {
                console.error('Error updating prompt:', error);
                showStatus('Failed to update prompt', 'error');
            }
        }
        
        // Show status message
        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + type;
            
            setTimeout(() => {
                statusEl.style.display = 'none';
                setTimeout(() => {
                    statusEl.className = 'status-message';
                }, 300);
            }, 3000);
        }
        
        // Display prompts
        function displayPrompts(prompts) {
            const listEl = document.getElementById('promptsList');
            
            if (prompts.length === 0) {
                listEl.innerHTML = '<div class="no-prompts">No prompts yet. Create your first one!</div>';
                return;
            }
            
            listEl.innerHTML = prompts.map(item => `
                <div class="prompt-item" onclick="selectPrompt('${escapeHtml(item.text)}')">
                    <div class="timestamp">${item.timestamp}</div>
                    <div class="text">${escapeHtml(item.text)}</div>
                </div>
            `).join('');
        }
        
        // Filter prompts based on search
        function filterPrompts() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            
            if (!searchTerm) {
                displayPrompts(allPrompts);
                return;
            }
            
            const filtered = allPrompts.filter(item => 
                item.text.toLowerCase().includes(searchTerm)
            );
            
            displayPrompts(filtered);
        }
        
        // Select a prompt from history
        function selectPrompt(text) {
            document.getElementById('promptInput').value = text;
            updatePreview();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load prompts on page load
        loadPrompts();
    </script>
</body>
</html>
