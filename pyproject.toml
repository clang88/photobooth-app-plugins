[project]
name = "filter-openai-plugin"
version = "0.1.0"
description = "OpenAI filter plugin for photobooth-app"
authors = ["Your Name <your@email.com>"]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "photobooth-app",  # Update to your local path or PyPI if available
    "Pillow",
    "niquests",
    "pydantic",
    "pydantic-settings",
    "pytest",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 150
target-version = "py310"